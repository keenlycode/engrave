site_name: 'Engrave Guide'
site_description: 'Guides for the Engrave, A lightweight static-site generator built on Python and Jinja.'
docs_dir: docs-src
site_dir: docs

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - CLI Reference: cli.md
  - Templates & Markdown: templates.md
  - Live Reload: live-reload.md

theme:
  name: material
  font:
    text: Fira Sans
    code: Fira Mono
  features:
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

extra:
  version:
    provider: mike
